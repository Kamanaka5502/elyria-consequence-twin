name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  proof-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Unit tests
        run: python -m pytest
      - name: Generate review-bundle digest manifest
        run: python scripts/generate_digest_manifest.py review-bundle/latest
      - name: Verify review-bundle digest manifest
        run: python scripts/verify_digest_manifest.py review-bundle/latest
      - name: External verifier
        run: python external_verifier/verify_bundle.py review-bundle/latest
      - name: Production preflight review mode
        run: python scripts/production_preflight.py --mode review
