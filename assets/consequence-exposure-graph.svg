<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Elyria Consequence Exposure Graph</title>
  <desc id="desc">A holographic consequence exposure graph showing admissible, hold, refused, and no-provable-admission paths.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#122b3a"/>
      <stop offset="55%" stop-color="#07121c"/>
      <stop offset="100%" stop-color="#02060b"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#143146" stop-opacity=".92"/>
      <stop offset="1" stop-color="#0b1928" stop-opacity=".86"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <style>
      .title{font:700 36px Georgia,serif;fill:#e7f8ff;letter-spacing:2px}
      .sub{font:700 15px Inter,Arial,sans-serif;fill:#d8f8ff;letter-spacing:.4px}
      .tiny{font:600 12px Inter,Arial,sans-serif;fill:#cdeeff}
      .node{stroke-width:2.5;filter:url(#glow)}
      .line{fill:none;stroke-width:2.5;stroke-linecap:round;opacity:.82;filter:url(#glow)}
      .green{stroke:#48ff9a;fill:#48ff9a}.yellow{stroke:#ffe66d;fill:#ffe66d}.red{stroke:#ff6c6c;fill:#ff6c6c}.black{stroke:#b7c5d8;fill:#b7c5d8}
      .label-green{fill:#65ffad}.label-yellow{fill:#ffe980}.label-red{fill:#ff8b8b}.label-black{fill:#d6e2f2}
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <ellipse cx="600" cy="635" rx="315" ry="42" fill="#00eaff" opacity=".12" filter="url(#soft)"/>
  <polygon points="148,58 1052,88 1034,560 164,586" fill="url(#panel)" stroke="#77e9ff" stroke-width="3" opacity=".96" filter="url(#glow)"/>
  <g opacity=".25">
    <path d="M170 112 H1026 M166 152 H1024 M164 192 H1022 M162 232 H1020 M160 272 H1018 M158 312 H1016 M156 352 H1014 M154 392 H1012 M152 432 H1010 M150 472 H1008 M148 512 H1006" stroke="#7beeff" stroke-width="1"/>
  </g>

  <text x="600" y="105" text-anchor="middle" class="title">ELYRIA CONSEQUENCE EXPOSURE GRAPH</text>

  <g transform="translate(410 126)">
    <rect x="0" y="0" width="95" height="24" fill="#33c878"/><rect x="95" y="0" width="95" height="24" fill="#f5dc53"/><rect x="190" y="0" width="95" height="24" fill="#d94c4c"/><rect x="285" y="0" width="95" height="24" fill="#111926"/>
    <rect x="0" y="24" width="95" height="24" fill="#172535"/><rect x="95" y="24" width="95" height="24" fill="#172535"/><rect x="190" y="24" width="95" height="24" fill="#172535"/><rect x="285" y="24" width="95" height="24" fill="#172535"/>
    <text x="47" y="17" text-anchor="middle" class="tiny" fill="#00120c">GREEN</text><text x="142" y="17" text-anchor="middle" class="tiny" fill="#151000">YELLOW</text><text x="237" y="17" text-anchor="middle" class="tiny" fill="#fff">RED</text><text x="332" y="17" text-anchor="middle" class="tiny" fill="#fff">BLACK</text>
    <text x="47" y="41" text-anchor="middle" class="tiny">admissible</text><text x="142" y="41" text-anchor="middle" class="tiny">hold</text><text x="237" y="41" text-anchor="middle" class="tiny">refusal</text><text x="332" y="41" text-anchor="middle" class="tiny">unprovable risk</text>
  </g>

  <g>
    <circle cx="600" cy="338" r="31" fill="#dffcff" opacity=".98" filter="url(#glow)"/>
    <circle cx="600" cy="338" r="70" fill="none" stroke="#39efff" stroke-opacity=".25" stroke-width="2"/>
    <text x="600" y="393" text-anchor="middle" class="sub">CONSEQUENCE</text>
    <text x="600" y="412" text-anchor="middle" class="sub">BINDING POINT</text>
  </g>

  <g id="left-lines">
    <path class="line green" d="M238 194 C344 210 442 270 600 338"/>
    <path class="line yellow" d="M230 266 C363 280 482 304 600 338"/>
    <path class="line red" d="M250 326 C388 330 474 334 600 338"/>
    <path class="line yellow" d="M238 390 C350 366 472 350 600 338"/>
    <path class="line green" d="M246 454 C375 426 492 374 600 338"/>
    <path class="line black" d="M244 514 C370 462 510 398 600 338"/>
  </g>
  <g id="right-lines">
    <path class="line green" d="M600 338 C734 262 849 228 960 206"/>
    <path class="line yellow" d="M600 338 C739 286 862 284 972 270"/>
    <path class="line yellow" d="M600 338 C740 320 858 332 974 342"/>
    <path class="line red" d="M600 338 C742 352 860 384 970 407"/>
    <path class="line black" d="M600 338 C742 386 842 438 955 475"/>
  </g>

  <g id="left-nodes">
    <circle class="node green" cx="238" cy="194" r="9"/><text x="129" y="188" class="sub label-green">AUTHORITY</text><text x="151" y="207" class="sub label-green">VALID</text>
    <circle class="node yellow" cx="230" cy="266" r="9"/><text x="118" y="259" class="sub label-yellow">EVIDENCE</text><text x="123" y="278" class="sub label-yellow">PENDING</text>
    <circle class="node red" cx="250" cy="326" r="9"/><text x="147" y="319" class="sub label-red">CUSTODY</text><text x="176" y="338" class="sub label-red">GAP</text>
    <circle class="node yellow" cx="238" cy="390" r="9"/><text x="102" y="384" class="sub label-yellow">STANDING</text><text x="116" y="403" class="sub label-yellow">CONFIRMED</text>
    <circle class="node green" cx="246" cy="454" r="9"/><text x="128" y="449" class="sub label-green">AUTHORITY</text><text x="173" y="468" class="sub label-green">VALID</text>
    <circle class="node black" cx="244" cy="514" r="9"/><text x="166" y="493" class="sub label-black">HOLD</text><text x="116" y="512" class="sub label-black">REPLAY</text><text x="122" y="531" class="sub label-black">VALIDATED</text>
  </g>

  <g id="mid-nodes">
    <circle class="node green" cx="462" cy="272" r="13"/><text x="427" y="222" text-anchor="middle" class="sub">AUTHORITY</text><text x="427" y="242" text-anchor="middle" class="sub">VALID</text>
    <circle class="node yellow" cx="574" cy="246" r="10"/><text x="574" y="202" text-anchor="middle" class="sub">EVIDENCE</text><text x="574" y="222" text-anchor="middle" class="sub">PENDING</text>
    <circle class="node yellow" cx="468" cy="445" r="10"/><text x="468" y="488" text-anchor="middle" class="sub">EVIDENCE</text><text x="468" y="508" text-anchor="middle" class="sub">PENDING</text>
  </g>

  <g id="right-nodes">
    <circle class="node green" cx="960" cy="206" r="9"/><text x="978" y="200" class="sub label-green">AUTHORITY</text><text x="978" y="219" class="sub label-green">VALID</text>
    <circle class="node yellow" cx="972" cy="270" r="9"/><text x="990" y="264" class="sub label-yellow">EVIDENCE</text><text x="990" y="283" class="sub label-yellow">PENDING</text>
    <circle class="node yellow" cx="974" cy="342" r="9"/><text x="993" y="336" class="sub label-yellow">STANDING</text><text x="993" y="355" class="sub label-yellow">CONFIRMED</text>
    <circle class="node red" cx="970" cy="407" r="9"/><text x="988" y="401" class="sub label-red">CUSTODY</text><text x="988" y="420" class="sub label-red">GAP</text>
    <circle class="node black" cx="955" cy="475" r="9"/><text x="973" y="461" class="sub label-black">REPLAY</text><text x="973" y="480" class="sub label-black">VALIDATED</text><text x="973" y="500" class="sub label-green">REPLAY VALIDATED</text>
  </g>

  <g transform="translate(705 256)" opacity=".88">
    <text class="tiny" x="0" y="0">+ AUTHORITY</text>
    <text class="tiny" x="0" y="17">+ EVIDENCE</text>
    <text class="tiny" x="0" y="34">+ CUSTODY</text>
    <text class="tiny" x="0" y="51">+ RECEIPT</text>
    <text class="tiny" x="0" y="68">+ REPLAY</text>
    <text class="tiny" x="0" y="85">+ REFUSAL CONDITION</text>
  </g>

  <g transform="translate(340 600)">
    <rect x="0" y="0" width="520" height="44" rx="8" fill="#07131f" stroke="#65e8ff" opacity=".92"/>
    <text x="260" y="28" text-anchor="middle" class="tiny">ACTIVE TWIN: elyria-consequence-twin</text>
  </g>
</svg>
